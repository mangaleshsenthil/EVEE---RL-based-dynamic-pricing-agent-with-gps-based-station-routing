version: "3.9"

services:

  # PostgreSQL Database 
  db:
    image: postgres:15-alpine
    container_name: evee_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-evee_db}
      POSTGRES_USER:     ${POSTGRES_USER:-evee_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./setup_postgres.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evee_user} -d ${POSTGRES_DB:-evee_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - evee_net

  # Streamlit Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evee_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      POSTGRES_HOST:     db
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB:-evee_db}
      POSTGRES_USER:     ${POSTGRES_USER:-evee_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      OCM_API_KEY:       ${OCM_API_KEY:-}
    volumes:
      - ./secrets_docker.toml:/app/.streamlit/secrets.toml:ro
    networks:
      - evee_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501/_stcore/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  evee_net:
    driver: bridge
